<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returning to Dashboard...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            width: min(92vw, 520px);
            background: rgba(30, 41, 59, 0.75);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 14px;
            padding: 22px;
            text-align: center;
        }
        .hint {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 8px;
        }
        .btn {
            margin-top: 14px;
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Returning to dashboard...</h2>
        <p class="hint">If redirect does not happen, use the button below.</p>
        <a id="fallback-link" class="btn" href="/">Back to Dashboard</a>
    </div>

    <script>
        const stored = sessionStorage.getItem('sonos_return_url');
        const target = stored && stored.trim() ? stored : '/';
        document.getElementById('fallback-link').setAttribute('href', target);
        window.location.replace(target);
    </script>
</body>
</html>
